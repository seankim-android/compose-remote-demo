[versions]
kotlin = "2.3.20"
ktor = "3.4.1"
logback = "1.5.21"
composeRemote = "1.0.0-alpha08"

[libraries]
logback-classic = { module = "ch.qos.logback:logback-classic", version.ref = "logback" }
compose-remote-core = { module = "androidx.compose.remote:remote-core", version.ref = "composeRemote" }
compose-remote-creation-jvm = { module = "androidx.compose.remote:remote-creation-jvm", version.ref = "composeRemote" }
compose-remote-creation-core = { module = "androidx.compose.remote:remote-creation-core", version.ref = "composeRemote" }

[plugins]
kotlin-jvm = { id = "org.jetbrains.kotlin.jvm", version.ref = "kotlin" }
kotlin-multiplatform = { id = "org.jetbrains.kotlin.multiplatform", version.ref = "kotlin" }
kotlin-serialization = { id = "org.jetbrains.kotlin.plugin.serialization", version.ref = "kotlin" }
ktor = { id = "io.ktor.plugin", version.ref = "ktor" }
